---
- name: Create apt keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Add InfluxData GPG key
  ansible.builtin.get_url:
    url: https://repos.influxdata.com/influxdata-archive.key
    dest: /etc/apt/keyrings/influxdata.asc
    owner: root
    group: root
    mode: "0644"

- name: Add InfluxData apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [signed-by=/etc/apt/keyrings/influxdata.asc]
      https://repos.influxdata.com/debian
      stable main
    state: present
    filename: influxdata

- name: Install telegraf
  ansible.builtin.apt:
    name: telegraf
    state: present
    update_cache: true

- name: Add telegraf user to docker group
  ansible.builtin.user:
    name: telegraf
    groups: docker
    append: true
  notify: restart telegraf
  when: telegraf_collect_docker | bool

- name: Create telegraf PostgreSQL role
  ansible.builtin.command:
    cmd: sudo -u postgres psql -c "CREATE ROLE telegraf LOGIN;"
  register: _telegraf_pg_role
  changed_when: "'CREATE ROLE' in _telegraf_pg_role.stdout"
  failed_when: _telegraf_pg_role.rc != 0 and 'already exists' not in _telegraf_pg_role.stderr
  when: telegraf_collect_postgres | bool

- name: Grant telegraf pg_monitor role
  ansible.builtin.command:
    cmd: sudo -u postgres psql -c "GRANT pg_monitor TO telegraf;"
  register: _telegraf_pg_grant
  changed_when: "'GRANT ROLE' in _telegraf_pg_grant.stdout"
  when: telegraf_collect_postgres | bool

- name: Install jq for Frigate stats script
  ansible.builtin.apt:
    name: jq
    state: present
  when: telegraf_collect_frigate | bool

- name: Deploy Frigate stats script
  ansible.builtin.template:
    src: frigate-stats.sh.j2
    dest: /usr/local/bin/frigate-stats.sh
    owner: root
    group: root
    mode: "0755"
  notify: restart telegraf
  when: telegraf_collect_frigate | bool

- name: Deploy telegraf configuration
  ansible.builtin.template:
    src: telegraf.conf.j2
    dest: /etc/telegraf/telegraf.conf
    owner: root
    group: root
    mode: "0644"
  notify: restart telegraf

- name: Ensure telegraf is started and enabled
  ansible.builtin.service:
    name: telegraf
    state: started
    enabled: true
