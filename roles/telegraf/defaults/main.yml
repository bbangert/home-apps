---
telegraf_victoriametrics_url: "http://127.0.0.1:8428"
telegraf_postgres_address: "host=/var/run/postgresql user=telegraf dbname=postgres sslmode=disable"
telegraf_nomad_url: "http://127.0.0.1:4646"
telegraf_collect_docker: true
telegraf_collect_postgres: false
telegraf_collect_nomad: false
telegraf_collect_frigate: false
telegraf_collect_intel_gpu: false
telegraf_disk_mount_points:
  - "/"
  - "/mnt/backups"
telegraf_systemd_units:
  - "telegraf.service"
  - "nomad.service"
  - "docker.service"
telegraf_frigate_url: "http://localhost:5000"
