---
postgres_version: 17
postgres_config_dir: "/etc/postgresql/17/main"

# Tuning — conservative for a shared node
postgres_shared_buffers: 2GB
postgres_effective_cache_size: 8GB
postgres_work_mem: 64MB
postgres_maintenance_work_mem: 512MB
postgres_max_connections: 200
postgres_listen_addresses: "*"

# Subnet allowed to connect from other cluster nodes
postgres_hba_lan_subnet: 192.168.2.0/24

# Superuser password — pulled from 1Password at playbook run time
postgres_superuser_password: >-
  {{ lookup('pipe', 'op read ' + onepassword_item_paths.postgres_superuser_password) }}

# pgBackRest
postgres_pgbackrest_enabled: true
postgres_pgbackrest_stanza: homestar-pg17
postgres_pgbackrest_repo_local_path: /mnt/backups/pgbackrest
postgres_pgbackrest_s3_bucket: homestar-cloudnative-pg
postgres_pgbackrest_s3_region: us-east-1
postgres_pgbackrest_s3_endpoint: s3.amazonaws.com
postgres_pgbackrest_s3_key: >-
  {{ lookup('pipe', 'op read ' + onepassword_item_paths.aws_access_key_id) }}
postgres_pgbackrest_s3_secret: >-
  {{ lookup('pipe', 'op read ' + onepassword_item_paths.aws_secret_access_key) }}
