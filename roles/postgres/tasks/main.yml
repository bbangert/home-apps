---
- name: Create apt keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Add PGDG GPG key
  ansible.builtin.get_url:
    url: https://www.postgresql.org/media/keys/ACCC4CF8.asc
    dest: /etc/apt/keyrings/pgdg.asc
    owner: root
    group: root
    mode: "0644"

- name: Add PGDG apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [signed-by=/etc/apt/keyrings/pgdg.asc]
      https://apt.postgresql.org/pub/repos/apt
      {{ ansible_facts["distribution_release"] }}-pgdg main
    state: present
    filename: pgdg

- name: Install PostgreSQL {{ postgres_version }}
  ansible.builtin.apt:
    name:
      - "postgresql-{{ postgres_version }}"
      - "postgresql-client-{{ postgres_version }}"
    state: present
    update_cache: true

- name: Ensure PostgreSQL is started and enabled
  ansible.builtin.service:
    name: postgresql
    state: started
    enabled: true

- name: Drop tuned config override
  ansible.builtin.template:
    src: 99-homestar.conf.j2
    dest: "{{ postgres_config_dir }}/conf.d/99-homestar.conf"
    owner: postgres
    group: postgres
    mode: "0640"
  notify: restart postgresql

- name: Allow LAN connections in pg_hba.conf
  ansible.builtin.lineinfile:
    path: "{{ postgres_config_dir }}/pg_hba.conf"
    line: "host    all             all             {{ postgres_hba_lan_subnet }}         scram-sha-256"
    regexp: "^host\\s+all\\s+all\\s+{{ postgres_hba_lan_subnet | regex_escape }}"
    state: present
  notify: reload postgresql

- name: Set postgres superuser password
  become: true
  become_user: postgres
  ansible.builtin.command:
    cmd: psql -c "ALTER USER postgres PASSWORD '{{ postgres_superuser_password }}';"
  no_log: true
  changed_when: false

- name: Allow PostgreSQL through ufw
  community.general.ufw:
    rule: allow
    port: "5432"
    proto: tcp

# pgBackRest
- name: Install pgBackRest
  ansible.builtin.apt:
    name: pgbackrest
    state: present
  when: postgres_pgbackrest_enabled | bool

- name: Create pgBackRest local repo directory
  ansible.builtin.file:
    path: "{{ postgres_pgbackrest_repo_local_path }}"
    state: directory
    owner: postgres
    group: postgres
    mode: "0750"
  when: postgres_pgbackrest_enabled | bool

- name: Create pgBackRest config directory
  ansible.builtin.file:
    path: /etc/pgbackrest
    state: directory
    owner: postgres
    group: postgres
    mode: "0750"
  when: postgres_pgbackrest_enabled | bool

- name: Write pgBackRest config
  ansible.builtin.template:
    src: pgbackrest.conf.j2
    dest: /etc/pgbackrest/pgbackrest.conf
    owner: postgres
    group: postgres
    mode: "0640"
  when: postgres_pgbackrest_enabled | bool

- name: Enable WAL archiving in PostgreSQL
  ansible.builtin.blockinfile:
    path: "{{ postgres_config_dir }}/conf.d/99-homestar.conf"
    marker: "# {mark} pgBackRest WAL archiving"
    block: |
      archive_mode               = on
      archive_command            = 'pgbackrest --stanza={{ postgres_pgbackrest_stanza }} archive-push %p'
      archive_timeout            = 60
      wal_level                  = replica
  notify: restart postgresql
  when: postgres_pgbackrest_enabled | bool

- name: Create pgBackRest stanza
  become: true
  become_user: postgres
  ansible.builtin.command:
    cmd: pgbackrest --stanza={{ postgres_pgbackrest_stanza }} stanza-create
  register: stanza_result
  changed_when: "'already exists' not in stanza_result.stderr"
  failed_when: stanza_result.rc != 0 and 'already exists' not in stanza_result.stderr
  when: postgres_pgbackrest_enabled | bool

- name: Create pgBackRest backup cron (daily full — local)
  ansible.builtin.cron:
    name: "pgbackrest daily full backup (local)"
    user: postgres
    hour: "2"
    minute: "0"
    job: "pgbackrest --stanza={{ postgres_pgbackrest_stanza }} --repo=1 --type=full backup 2>&1 | logger -t pgbackrest"
  when: postgres_pgbackrest_enabled | bool

- name: Create pgBackRest backup cron (daily full — S3)
  ansible.builtin.cron:
    name: "pgbackrest daily full backup (s3)"
    user: postgres
    hour: "2"
    minute: "30"
    job: "pgbackrest --stanza={{ postgres_pgbackrest_stanza }} --repo=2 --type=full backup 2>&1 | logger -t pgbackrest"
  when: postgres_pgbackrest_enabled | bool

- name: Create pgBackRest backup cron (hourly diff — local)
  ansible.builtin.cron:
    name: "pgbackrest hourly diff backup (local)"
    user: postgres
    minute: "0"
    hour: "3-23"
    job: "pgbackrest --stanza={{ postgres_pgbackrest_stanza }} --repo=1 --type=diff backup 2>&1 | logger -t pgbackrest"
  when: postgres_pgbackrest_enabled | bool
