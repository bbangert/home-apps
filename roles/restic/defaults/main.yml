---
restic_backup_paths:
  - /srv
restic_exclude_patterns:
  - /srv/immich/ml-cache
restic_local_repo: /mnt/backups/restic
restic_s3_repo: "s3:s3.amazonaws.com/homestar-cloudnative-pg/restic"
