---
restic_backup_paths:
  - /srv
restic_exclude_patterns:
  - /srv/immich/ml-cache
restic_local_repo: /mnt/backups/restic
restic_enable_local_repo: true
restic_s3_repo: "s3:s3.amazonaws.com/homestar-cloudnative-pg/restic"
restic_enable_b2_repo: false
restic_b2_repo: ""
restic_b2_backup_paths: []
restic_b2_exclude_patterns: []
restic_keep_daily: 7
restic_keep_weekly: 4
restic_keep_monthly: 6
restic_backup_schedule: "*-*-* 03:00:00"
restic_prune_schedule: "Sun *-*-* 04:00:00"
